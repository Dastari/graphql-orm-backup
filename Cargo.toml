[package]
name = "graphql-orm-backup"
version = "0.1.0"
edition = "2024"
license = "MIT"
repository = "https://github.com/Dastari/graphql-orm-backup"
description = "Backup and restore orchestration primitives for graphql-orm applications"

[features]
default = ["local"]
local = []
s3 = []
azure = []
dropbox = []
smb = []

[dependencies]
async-trait = "0.1"
bytes = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
thiserror = "2"
tokio = { version = "1", features = ["fs"] }
uuid = { version = "1", features = ["serde", "v4"] }

[dev-dependencies]
tempfile = "3"
tokio = { version = "1", features = ["fs", "macros", "rt-multi-thread"] }
